---
- name: Kubernetes API demo (no kubectl required)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    - name: List nodes
      kubernetes.core.k8s_info:
        kind: Node
        kubeconfig: /etc/semaphore/secrets/kubeconfig
      register: node_info

    - name: Show node names
      ansible.builtin.debug:
        msg: "{{ node_info.resources | map(attribute='metadata.name') | list }}"
