---
- name: Confirm Ansible Vault decryption is working
  hosts: localhost
  connection: local
  gather_facts: false
  become: false

  tasks:
    - name: Show whether the vaulted variable was decrypted
      ansible.builtin.debug:
        msg: >-
          {{ ('VAULT OK -- decrypted value is: ' + vault_test_secret)
             if (vault_test_secret is defined)
             else 'VAULT NOT WORKING -- vault_test_secret is undefined' }}
