---
- name: Update and upgrade Ubuntu hosts
  hosts: ubuntu_servers
  become: true
  become_method: sudo
  gather_facts: true

  # group_vars/all/vault.yml loads automatically -- no vars_files needed.
  # If a value below is wrapped in a vault_* var that doesn't exist yet,
  # the task simply won't use it; nothing breaks until you reference it.

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: "{{ apt_cache_valid_time | default(3600) }}"

    - name: Upgrade all packages (dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
      register: apt_upgrade_result

    - name: Remove no-longer-needed packages
      ansible.builtin.apt:
        autoremove: true

    - name: Check whether a reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "Reboot triggered by Ansible after package updates"
        reboot_timeout: "{{ update_reboot_timeout | default(600) }}"
      when: reboot_required_file.stat.exists

    - name: Report result
      ansible.builtin.debug:
        msg: >-
          Updates applied on {{ inventory_hostname }}.
          Reboot was {{ 'required and performed' if reboot_required_file.stat.exists else 'not required' }}.

  # NOTE on become + sudo-rs:
  # If this host is one of the ones where sudo-rs changed how Ansible's
  # become mechanism behaves, make sure ansible_become_method /
  # ansible_become_flags are set appropriately for that host in inventory
  # before relying on this playbook unattended via Semaphore's scheduler.
