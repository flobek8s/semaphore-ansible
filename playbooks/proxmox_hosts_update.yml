- name: Update Proxmox VE and PBS hosts
  hosts: proxmox_servers
  become: true
  serial: 1          # one host at a time - standalone hosts, no cluster quorum to worry about, but still safer
  vars:
    reboot_if_required: false
    ntfy_topic: "https://ntfy.lewisanalytix.com/pbs"
 
  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600
 
    - name: Full-upgrade (dist-upgrade) packages
      apt:
        upgrade: dist
        autoremove: true
        autoclean: true
      register: apt_result
 
    - name: Check if a reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file
 
    - name: Check for running VMs (PVE hosts only)
      ansible.builtin.shell: |
        set -o pipefail
        qm list --full 2>/dev/null | awk '$3=="running"{c++} END{print c+0}'
      args:
        executable: /bin/bash
      register: running_vms
      changed_when: false
      when: "'pve_hosts' in group_names"
 
    - name: Check for running containers (PVE hosts only)
      ansible.builtin.shell: |
        set -o pipefail
        pct list 2>/dev/null | awk '$2=="running"{c++} END{print c+0}'
      args:
        executable: /bin/bash
      register: running_cts
      changed_when: false
      when: "'pve_hosts' in group_names"
 
    - name: Report host status
      debug:
        msg: >
          {{ inventory_hostname }}:
          reboot_required={{ reboot_required_file.stat.exists }},
          running_vms={{ running_vms.stdout | default('n/a') }},
          running_cts={{ running_cts.stdout | default('n/a') }}
 
    - name: Notify via ntfy if reboot is required
      uri:
        url: "{{ ntfy_topic }}"
        method: POST
        body: >-
          {{ inventory_hostname }} finished updating.
          Reboot required: {{ reboot_required_file.stat.exists }}.
          Running VMs: {{ running_vms.stdout | default('n/a') }},
          Running CTs: {{ running_cts.stdout | default('n/a') }}
        body_format: raw
        status_code: 200
      delegate_to: localhost
      when: reboot_required_file.stat.exists
 
    - name: Notify via ntfy that host is fully updated, no reboot needed
      uri:
        url: "{{ ntfy_topic }}"
        method: POST
        body: "{{ inventory_hostname }} updated successfully. No reboot required."
        body_format: raw
        status_code: 200
      delegate_to: localhost
      when: not reboot_required_file.stat.exists
 
    - name: Reboot host (only if allowed and safe)
      reboot:
        msg: "Rebooting after Proxmox update via Ansible"
        reboot_timeout: 600
      when:
        - reboot_required_file.stat.exists
        - reboot_if_required | bool
        - (running_vms.stdout | default('0') | int) == 0
        - (running_cts.stdout | default('0') | int) == 0
 
    - name: Warn if reboot needed but skipped due to running guests
      debug:
        msg: >
          WARNING: {{ inventory_hostname }} needs a reboot but has
          {{ running_vms.stdout | default('0') }} running VM(s) and
          {{ running_cts.stdout | default('0') }} running container(s).
          Skipping automatic reboot - handle manually.
      when:
        - reboot_required_file.stat.exists
        - "'pve_hosts' in group_names"
        - ((running_vms.stdout | default('0') | int) > 0) or ((running_cts.stdout | default('0') | int) > 0)