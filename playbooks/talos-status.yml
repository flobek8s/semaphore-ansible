---
# talosctl has no Python SDK/Ansible collection with real coverage, so this
# shells out to the actual binary baked into the custom Semaphore image.
# Requires TALOSCONFIG to be set (it is, via the Deployment's env vars --
# see semaphore-deploy/apps/semaphore/values.yaml).

- name: Talos cluster health check
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Get Talos node version info
      ansible.builtin.command:
        cmd: talosctl version --short
      register: talos_version
      changed_when: false

    - name: Show output
      ansible.builtin.debug:
        var: talos_version.stdout_lines
