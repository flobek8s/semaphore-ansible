[defaults]
inventory       = inventory/hosts.yml
roles_path      = roles
collections_path = collections
host_key_checking = True
retry_files_enabled = False
stdout_callback = ansible.builtin.default
callback_result_format = yaml
interpreter_python = auto_silent

# NOTE: vault_password_file is intentionally NOT set here.
# When you run ansible-playbook locally (your laptop), pass it explicitly:
#   ansible-playbook playbooks/site.yml --vault-password-file ~/.ansible/vault_pass.txt
# When Semaphore runs these playbooks, it supplies the vault password itself
# (from Key Store -> attached to the Task Template) and does NOT read this file.

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False

[ssh_connection]
pipelining = True
