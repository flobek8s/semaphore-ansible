---
# Replace with your real hosts. This file is plaintext -- nothing sensitive
# belongs here. Credentials live in Semaphore's Key Store at runtime, or in
# the encrypted group_vars/all/vault.yml for local/CLI runs.
all:
  children:
    ubuntu_servers:
      hosts:
        talos-mgr2:
          ansible_host: 192.168.20.58   # <-- replace with real IP/hostname
        k8s-nfs:
          ansible_host: 192.168.20.43
        vpn-vm:
          ansible_host: 192.168.20.62
          ansible_become_exe: sudo.ws
      vars:
        ansible_user: cory
        # When running ansible-playbook locally from your laptop you'd set
        # ansible_ssh_private_key_file here. When Semaphore runs the task,
        # it injects the SSH key from the Key Store credential attached to
        # this Inventory/Repository instead -- this var is ignored in that path.

    proxmox_vps:
      hosts: {}
      vars:
        ansible_user: cory
