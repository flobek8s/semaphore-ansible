---
all:
  children:
    ubuntu_servers:
      hosts:
        talos-mgr2:
          ansible_host: "{{ talos_mgr2_ip }}"
        k8s-nfs:
          ansible_host: "{{ k8s_nfs_ip }}"
        vpn-vm:
          ansible_host: "{{ vpn_vm_ip }}"
          ansible_become_exe: sudo.ws
      vars:
        ansible_user: "{{ ansible_user }}"

    proxmox_vps:
      hosts: {}
      vars:
        ansible_user: "{{ ansible_user }}"
